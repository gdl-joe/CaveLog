<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CaveLog – Höhlen-Logbuch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a1410 0%, #0a0705 70%);
    color: #e8d5a0;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* noise overlay on the stage background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 0;
  }

  /* scrollbar in app content */
  .cl-scroll::-webkit-scrollbar { width: 4px; }
  .cl-scroll::-webkit-scrollbar-track { background: transparent; }
  .cl-scroll::-webkit-scrollbar-thumb { background: rgba(245, 165, 36, 0.25); border-radius: 2px; }

  /* no blue tap highlight inside frame */
  .cl-app * { -webkit-tap-highlight-color: transparent; }

  /* amber glow used for hero elements */
  @keyframes cl-lantern {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 1; }
  }
  .cl-glow { animation: cl-lantern 4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/theme.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/atoms.jsx"></script>
<script type="text/babel" src="src/screens-feed.jsx"></script>
<script type="text/babel" src="src/screens-detail.jsx"></script>
<script type="text/babel" src="src/screens-new.jsx"></script>
<script type="text/babel" src="src/screens-map.jsx"></script>
<script type="text/babel" src="src/screens-caves.jsx"></script>
<script type="text/babel" src="src/screens-stats.jsx"></script>
<script type="text/babel" src="src/screens-profile.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
